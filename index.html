<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Archive | MD ANiK SHEiKH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:italic,wght@300;600&family=Inter:wght@200;400;600&display=swap');
        
        :root { --bg: #f8f8f6; --card-bg: #ffffff; --accent: #111111; }
        body { background-color: var(--bg); color: var(--accent); font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        /* Loader */
        #welcome-screen { position: fixed; inset: 0; background: var(--bg); z-index: 999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .loader-line { width: 0%; height: 1px; background: #000; transition: width 2s ease; }
        #main-content { opacity: 0; transition: opacity 1.5s ease; }

        /* Perfect Responsive Logo */
        .logo-box-custom { 
            width: 48px; height: 48px; 
            background: #000; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center;
            transition: 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            cursor: pointer;
        }
        .logo-box-custom:hover { transform: scale(1.1) rotate(5deg); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }

        /* Card System */
        .tech-card { 
            background: var(--card-bg); 
            border: 1px solid rgba(0,0,0,0.04); 
            padding: clamp(16px, 4vw, 24px); 
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1); 
        }
        .tech-card:hover { transform: translateY(-8px); box-shadow: 0 40px 70px rgba(0,0,0,0.05); }
        
        .img-container { 
            width: 100%; height: clamp(300px, 50vh, 420px); 
            background: #f0f0ee; display: flex; align-items: center; 
            justify-content: center; overflow: hidden; 
        }
        .img-container img { max-width: 90%; max-height: 90%; object-fit: contain; }

        /* Copy Button */
        .prompt-area { position: relative; background: #fcfcfb; padding: 25px; margin-top: 20px; border: 1px solid #f0f0ee; min-height: 80px; }
        .copy-icon-btn { position: absolute; top: 15px; right: 15px; font-size: 16px; color: #bbb; cursor: pointer; transition: 0.3s; z-index: 10; }
        .copy-icon-btn.copied { color: #27ae60 !important; }

        .editorial-title { font-family: 'Cormorant Garamond', serif; }
        .label-text { font-size: clamp(8px, 2vw, 10px); text-transform: uppercase; letter-spacing: 0.3em; color: #999; }
        
        /* Footer */
        .social-link { font-size: 20px; color: #999; transition: 0.3s; }
        .social-link:hover { color: #000; transform: translateY(-3px); }
    </style>
</head>
<body>

    <div id="welcome-screen">
        <p class="label-text mb-4">ACCESSING SYSTEM</p>
        <div class="w-40 h-[1px] bg-zinc-200"><div id="loader-bar" class="loader-line"></div></div>
    </div>

    <div id="main-content">
        <nav class="py-8 md:py-12 px-6 md:px-10 flex justify-between items-center max-w-[1500px] mx-auto border-b border-zinc-100">
            <div class="logo-box-custom" title="The Archive">
                <svg width="24" height="24" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="60" cy="50" r="2" fill="white" opacity="0.8"/>
                    <circle cx="140" cy="60" r="1.5" fill="white" opacity="0.6"/>
                    <circle cx="100" cy="30" r="3" fill="white" class="animate-pulse"/>
                    <path d="M60 85C60 85 80 65 100 65C120 65 140 85 140 85C140 85 120 105 100 105C80 105 60 85 60 85Z" stroke="white" stroke-width="3"/>
                    <circle cx="100" cy="85" r="8" fill="white"/>
                    <path d="M100 155V125M100 125C100 125 85 120 70 125C55 130 50 150 50 150C50 150 65 145 80 145C95 145 100 155 100 155ZM100 125C100 125 115 120 130 125C145 130 150 150 150 150C150 150 135 145 120 145C105 145 100 155 100 155Z" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>
            <span class="label-text">SYS_V4.0 // ONLINE</span>
        </nav>

        <header class="py-20 md:py-32 text-center px-4">
            <h2 class="text-6xl md:text-9xl editorial-title font-light tracking-tight mb-4 text-zinc-900">
                The <span class="italic text-zinc-400">Archive.</span>
            </h2>
            <p class="label-text text-zinc-400 mt-6 tracking-[0.6em]">Curated Visual Intelligence</p>
        </header>

        <main id="main-grid" class="max-w-[1500px] mx-auto px-6 md:px-10 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10 md:gap-14 pb-40">
            </main>

        <footer class="py-24 border-t border-zinc-200 bg-white text-center px-6">
            <div class="flex justify-center gap-10 mb-12">
                <a href="https://instagram.com/6mdaniksheikh9" target="_blank" class="social-link"><i class="fa-brands fa-instagram"></i></a>
                <a href="https://facebook.com/6mdaniksheikh9" target="_blank" class="social-link"><i class="fa-brands fa-facebook-f"></i></a>
                <a href="https://github.com/6anik9" target="_blank" class="social-link"><i class="fa-brands fa-github"></i></a>
            </div>
            <p class="label-text mb-2 tracking-[0.4em]">THE ARCHIVE // TERMINAL</p>
            <p class="text-[9px] text-zinc-300 tracking-[0.2em] uppercase">© 2026 Limited Edition Visuals</p>
        </footer>
    </div>

    <script>
        const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQTpKvnBNdPxRkepgDMqxhwp-oZIiDO69lFfNXaMxPSVdgWPUuBzLQsiKEVL6ursmPGoEVzSXme5VvK/pub?gid=0&single=true&output=csv";

        window.onload = () => {
            document.getElementById('loader-bar').style.width = '100%';
            fetchData();
        };

        async function fetchData() {
            Papa.parse(SHEET_URL, {
                download: true, header: true, skipEmptyLines: true,
                complete: (results) => {
                    renderCards(results.data);
                    setTimeout(() => {
                        document.getElementById('welcome-screen').style.opacity = '0';
                        document.getElementById('main-content').style.opacity = '1';
                        setTimeout(() => document.getElementById('welcome-screen').remove(), 1000);
                    }, 1200);
                }
            });
        }

        function renderCards(data) {
            const grid = document.getElementById('main-grid');
            grid.innerHTML = data.map((item, i) => {
                const title = item.Title || "Untitled";
                const img = item.ImageURL || "https://via.placeholder.com/800";
                const prompt = item.Prompt || "No prompt available.";
                const cat = item.Category || "Archive";
                if(!item.Title) return '';
                return `
                <div class="tech-card group">
                    <div class="img-container">
                        <img src="${img}" alt="${title}" referrerpolicy="no-referrer">
                    </div>
                    <div class="pt-10">
                        <div class="flex justify-between mb-4 items-center">
                            <span class="label-text text-zinc-400">${cat}</span>
                            <span class="label-text">INDEX_0${i+1}</span>
                        </div>
                        <h3 class="text-3xl editorial-title font-semibold mb-6 tracking-wide group-hover:tracking-wider transition-all duration-500">${title}</h3>
                        <div class="prompt-area">
                            <i class="fa-regular fa-copy copy-icon-btn" onclick="copyText('${prompt.replace(/'/g, "\\'").replace(/"/g, '&quot;')}', this)"></i>
                            <p class="text-[11px] leading-relaxed text-zinc-400 font-light italic pr-8">"${prompt}"</p>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        function copyText(text, icon) {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            document.execCommand('copy');
            icon.classList.remove('fa-regular', 'fa-copy');
            icon.classList.add('fa-solid', 'fa-check', 'copied');
            setTimeout(() => {
                icon.classList.remove('fa-solid', 'fa-check', 'copied');
                icon.classList.add('fa-regular', 'fa-copy');
            }, 2000);
            document.body.removeChild(textArea);
        }
    </script>
</body>
</html>
