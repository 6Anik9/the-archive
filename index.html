<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANiK | The Premium Archive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;700&family=Space+Grotesk:wght@300;500&display=swap');
        
        :root { 
            --accent: #111111; 
            --bg: #fcfcfc; 
            --soft-gray: #f5f5f5;
        }
        
        body { 
            background-color: var(--bg); 
            color: var(--accent); 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            overflow-x: hidden; 
        }
        
        /* Luxurious Loader */
        #welcome-screen { 
            position: fixed; inset: 0; background: #ffffff; z-index: 999; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            transition: all 1s cubic-bezier(0.19, 1, 0.22, 1); 
        }
        .loader-line { width: 0%; height: 1px; background: var(--accent); transition: width 2s ease-in-out; }
        
        #main-content { opacity: 0; transition: opacity 1.2s ease-in; }

        /* Premium Card Design */
        .tech-card { 
            background: #ffffff; 
            border: 1px solid #eeeeee;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .tech-card:hover { 
            border-color: #000; 
            transform: translateY(-10px);
            box-shadow: 0 30px 60px rgba(0,0,0,0.05);
        }
        
        /* Image Display (No Cropping) */
        .img-container { 
            position: relative; width: 100%; height: 350px; 
            background: var(--soft-gray); overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }
        .img-container img { 
            max-width: 100%; max-height: 100%; 
            object-fit: contain; 
            transition: transform 1.2s cubic-bezier(0.19, 1, 0.22, 1);
        }
        .tech-card:hover img { transform: scale(1.03); }

        /* Typography & Utility */
        .luxury-text { letter-spacing: 0.3em; text-transform: uppercase; font-size: 10px; color: #888; }
        .nav-link { font-size: 11px; font-weight: 700; letter-spacing: 0.2em; transition: 0.3s; }
        .nav-link:hover { opacity: 0.5; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #f5f5f5; }
        ::-webkit-scrollbar-thumb { background: #000; }
    </style>
</head>
<body>

    <div id="welcome-screen">
        <div class="mb-6 luxury-text animate-pulse">Establishing Connection</div>
        <div class="w-48 bg-zinc-100 h-[1px] overflow-hidden"><div id="loader-bar" class="loader-line"></div></div>
    </div>

    <div id="main-content">
        <nav class="p-10 flex justify-between items-center max-w-7xl mx-auto border-b border-zinc-100 relative z-10">
            <h1 class="text-lg font-bold tracking-[0.5em] uppercase">ANiK</h1>
            <div id="data-status" class="luxury-text">Archive v2.0 // Online</div>
        </nav>

        <header class="py-32 px-8 text-center relative z-10">
            <p class="luxury-text mb-6">Curated Visual Intelligence</p>
            <h2 class="text-7xl md:text-9xl font-extralight tracking-tighter uppercase mb-4 leading-none text-zinc-900">
                The <span class="italic font-serif">Archive.</span>
            </h2>
        </header>

        <main id="main-grid" class="max-w-7xl mx-auto px-8 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-16 pb-40 relative z-10">
            </main>

        <footer class="border-t border-zinc-100 py-32 text-center relative z-10 bg-zinc-50">
            <div class="flex justify-center gap-12 mb-10">
                <a href="https://github.com/6anik9" target="_blank" class="nav-link">GITHUB</a>
                <a href="https://instagram.com/6mdaniksheikh9" target="_blank" class="nav-link">INSTAGRAM</a>
            </div>
            <p class="luxury-text">© 2026 MD ANiK SHEiKH. All Rights Reserved.</p>
        </footer>
    </div>

    <script>
        const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQTpKvnBNdPxRkepgDMqxhwp-oZIiDO69lFfNXaMxPSVdgWPUuBzLQsiKEVL6ursmPGoEVzSXme5VvK/pub?gid=0&single=true&output=csv&t=" + new Date().getTime();

        window.onload = () => {
            document.getElementById('loader-bar').style.width = '100%';
            fetchData();
        };

        async function fetchData() {
            Papa.parse(SHEET_URL, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: (results) => {
                    if(results.data && results.data.length > 0) {
                        renderCards(results.data);
                        setTimeout(revealSite, 1200);
                    }
                }
            });
        }

        function renderCards(data) {
            const grid = document.getElementById('main-grid');
            grid.innerHTML = data.map((item, i) => {
                const title = item.Title || item.TITLE || "Subject_" + (i+1);
                const img = item.ImageURL || item.IMAGEURL || "https://via.placeholder.com/800";
                const prompt = item.Prompt || "No data.";
                const category = item.Category || "Studio";

                if(!item.Title && !item.Prompt) return '';

                return `
                <div class="tech-card group">
                    <div class="img-container">
                        <img src="${img}" alt="${title}" referrerpolicy="no-referrer">
                    </div>
                    <div class="p-10">
                        <div class="flex justify-between items-center mb-6">
                            <span class="luxury-text text-zinc-400">${category}</span>
                            <span class="luxury-text text-zinc-300">#${i+1}</span>
                        </div>
                        <h3 class="text-2xl font-light tracking-tight mb-6 uppercase text-zinc-800 group-hover:tracking-[0.1em] transition-all duration-500">${title}</h3>
                        <div class="bg-zinc-50 p-6 text-[12px] text-zinc-500 font-light italic mb-8 border-l border-zinc-200 leading-relaxed">
                            "${prompt}"
                        </div>
                        <button onclick="copyPrompt(this, \`${prompt.replace(/`/g, '\\`')}\`)" 
                                class="w-full py-4 bg-zinc-900 text-white text-[10px] uppercase tracking-[0.4em] font-bold hover:bg-zinc-700 transition-all">
                            COPY ACCESS
                        </button>
                    </div>
                </div>`;
            }).join('');
        }

        function revealSite() {
            document.getElementById('welcome-screen').style.opacity = '0';
            document.getElementById('main-content').style.opacity = '1';
            setTimeout(() => document.getElementById('welcome-screen').remove(), 1000);
        }

        function copyPrompt(btn, text) {
            navigator.clipboard.writeText(text).then(() => {
                const original = btn.innerText;
                btn.innerText = "COPIED TO CLIPBOARD";
                btn.style.backgroundColor = "#000";
                setTimeout(() => {
                    btn.innerText = original;
                    btn.style.backgroundColor = "";
                }, 2000);
            });
        }
    </script>
</body>
</html>
