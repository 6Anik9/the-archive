<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Archive | MD ANiK SHEiKH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:italic,wght@300;600&family=Inter:wght@200;400;600&display=swap');
        
        :root { --bg: #f8f8f6; --card-bg: #ffffff; }
        body { background-color: var(--bg); color: #111; font-family: 'Inter', sans-serif; overflow-x: hidden; margin: 0; }
        
        /* Loading Screen */
        #welcome-screen { 
            position: fixed; inset: 0; background: var(--bg); z-index: 9999; 
            display: flex; justify-content: center; align-items: center; 
        }
        .loader-line { width: 0%; height: 2px; background: #000; transition: width 0.5s ease; }

        /* Navigation */
        .nav-wrapper { position: relative; z-index: 1000; }
        .sketch-logo-btn {
            width: 55px; height: 55px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; -webkit-tap-highlight-color: transparent;
        }

        /* Dropdown Menu */
        #drop-menu {
            position: absolute; top: 65px; left: 0;
            background: white; border: 1px solid rgba(0,0,0,0.08);
            width: 200px; border-radius: 2px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            transform: scaleY(0); transform-origin: top;
            opacity: 0; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            pointer-events: none;
        }
        #drop-menu.active { transform: scaleY(1); opacity: 1; pointer-events: auto; }

        .menu-link {
            padding: 15px 20px; display: block;
            font-size: 10px; text-transform: uppercase; letter-spacing: 0.25em;
            color: #999; transition: 0.3s; border-bottom: 1px solid #f9f9f8;
            cursor: pointer;
        }
        .menu-link:hover { color: #000; background: #fafafa; padding-left: 25px; }

        /* Grid System */
        .tech-card { background: var(--card-bg); border: 1px solid rgba(0,0,0,0.04); padding: 24px; transition: 0.5s; }
        .img-container { width: 100%; height: 420px; background: #f0f0ee; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .img-container img { max-width: 92%; max-height: 92%; object-fit: contain; }

        .prompt-area { position: relative; background: #fcfcfb; padding: 25px; margin-top: 20px; border: 1px solid #f0f0ee; min-height: 80px; }
        .copy-icon-btn { position: absolute; top: 15px; right: 15px; font-size: 16px; color: #bbb; cursor: pointer; }

        .editorial-title { font-family: 'Cormorant Garamond', serif; }
        .label-text { font-size: 10px; text-transform: uppercase; letter-spacing: 0.3em; color: #999; }
    </style>
</head>
<body>

    <div id="welcome-screen">
        <div class="w-32 h-[1px] bg-zinc-200">
            <div id="loader-bar" class="loader-line"></div>
        </div>
    </div>

    <div id="main-content" style="display:none;">
        <nav class="py-10 px-10 flex justify-between items-center max-w-[1500px] mx-auto border-b border-zinc-100">
            <div class="nav-wrapper">
                <div class="sketch-logo-btn" id="logo-trigger">
                    <svg width="55" height="55" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="100" cy="100" r="85" stroke="black" stroke-width="2.5" stroke-dasharray="8 4"/>
                        <path d="M60 85C60 85 80 65 100 65C120 65 140 85 140 85C140 85 120 105 100 105C80 105 60 85 60 85Z" stroke="black" stroke-width="2.5"/>
                        <circle cx="100" cy="85" r="10" stroke="black" stroke-width="2"/>
                        <circle cx="100" cy="85" r="4" fill="black"/>
                        <path d="M100 120V160M100 120C100 120 80 115 60 120C45 125 45 155 45 155C45 155 60 150 75 150C90 150 100 160 100 160ZM100 120C100 120 120 115 140 120C155 125 155 155 155 155C155 155 140 150 125 150C110 150 100 160 100 160Z" stroke="black" stroke-width="2.5" stroke-linecap="round"/>
                    </svg>
                </div>
                <div id="drop-menu">
                    <div class="menu-link" onclick="changeSheet('main')">Main Archive</div>
                    <div class="menu-link" onclick="changeSheet('enhance')">Enhance</div>
                    <div class="menu-link" onclick="changeSheet('prompt')">Prompt Breaker</div>
                </div>
            </div>
            <span class="label-text">SYS_V4.0 // ONLINE</span>
        </nav>

        <header class="py-24 text-center">
            <h2 id="page-title" class="text-7xl md:text-9xl editorial-title font-light tracking-tight mb-4 text-zinc-900">
                The <span class="italic text-zinc-400">Archive.</span>
            </h2>
            <p id="page-sub" class="label-text text-zinc-400 mt-6 tracking-[0.6em]">Curated Visual Intelligence</p>
        </header>

        <main id="main-grid" class="max-w-[1500px] mx-auto px-10 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-14 pb-40">
            </main>
    </div>

    <script>
        const SHEETS = {
            main: "https://docs.google.com/spreadsheets/d/e/2PACX-1vQTpKvnBNdPxRkepgDMqxhwp-oZIiDO69lFfNXaMxPSVdgWPUuBzLQsiKEVL6ursmPGoEVzSXme5VvK/pub?gid=0&single=true&output=csv",
            enhance: "https://docs.google.com/spreadsheets/d/e/2PACX-1vRPZxdHprNT50YNAKd675Va5jMejh5_jOjo3oCE4cAaLdBGF66ZWROJBbWckaPztcHKPq6WzVM0JuqV/pub?output=csv",
            prompt: "" 
        };

        const trigger = document.getElementById('logo-trigger');
        const menu = document.getElementById('drop-menu');
        const loader = document.getElementById('loader-bar');

        // Toggle logic
        trigger.onclick = (e) => {
            e.stopPropagation();
            menu.classList.toggle('active');
        };

        document.onclick = () => menu.classList.remove('active');

        window.onload = () => {
            loader.style.width = '100%';
            fetchData(SHEETS.main);
        };

        function changeSheet(type) {
            const title = document.getElementById('page-title');
            const sub = document.getElementById('page-sub');
            
            // Show loading
            document.getElementById('welcome-screen').style.display = 'flex';
            loader.style.width = '0%';
            setTimeout(() => loader.style.width = '100%', 10);

            if(type === 'main') {
                title.innerHTML = 'The <span class="italic text-zinc-400">Archive.</span>';
                sub.innerText = 'Curated Visual Intelligence';
                fetchData(SHEETS.main);
            } else if(type === 'enhance') {
                title.innerHTML = 'Visual <span class="italic text-zinc-400">Enhance.</span>';
                sub.innerText = 'AI REFINEMENT ENGINE';
                fetchData(SHEETS.enhance);
            }
            menu.classList.remove('active');
        }

        async function fetchData(url) {
            if(!url) return;
            Papa.parse(url, {
                download: true, header: true, skipEmptyLines: true,
                complete: (results) => {
                    renderCards(results.data);
                    // Hide loading after parsing
                    setTimeout(() => {
                        document.getElementById('welcome-screen').style.display = 'none';
                        document.getElementById('main-content').style.display = 'block';
                    }, 800);
                }
            });
        }

        function renderCards(data) {
            const grid = document.getElementById('main-grid');
            grid.innerHTML = data.map((item, i) => {
                if(!item.Title || !item.ImageURL) return '';
                return `
                <div class="tech-card">
                    <div class="img-container">
                        <img src="${item.ImageURL}" referrerpolicy="no-referrer">
                    </div>
                    <div class="pt-10">
                        <div class="flex justify-between mb-4 items-center">
                            <span class="label-text text-zinc-400">${item.Category || 'SYSTEM'}</span>
                            <span class="label-text">INDEX_0${i+1}</span>
                        </div>
                        <h3 class="text-3xl editorial-title font-semibold mb-6 tracking-wide">${item.Title}</h3>
                        <div class="prompt-area">
                            <i class="fa-regular fa-copy copy-icon-btn" onclick="copyPrompt(this, '${item.Prompt.replace(/'/g, "\\'")}')"></i>
                            <p class="text-[11px] leading-relaxed text-zinc-400 font-light italic">"${item.Prompt}"</p>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        function copyPrompt(btn, text) {
            navigator.clipboard.writeText(text).then(() => {
                btn.className = 'fa-solid fa-check copy-icon-btn text-green-500';
                setTimeout(() => btn.className = 'fa-regular fa-copy copy-icon-btn', 2000);
            });
        }
    </script>
</body>
</html>
