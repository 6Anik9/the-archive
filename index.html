<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANiK | Executive Archive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:italic,wght@300;600&family=Inter:wght@200;400;600&family=Playfair+Display:ital,wght@1,900&display=swap');
        
        :root { 
            --bg: #f8f8f6; 
            --card-bg: #ffffff;
            --accent: #111111;
        }
        
        body { background-color: var(--bg); color: var(--accent); font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        /* Smooth Loader */
        #welcome-screen { position: fixed; inset: 0; background: var(--bg); z-index: 999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .loader-line { width: 0%; height: 1px; background: #000; transition: width 2s ease; }
        #main-content { opacity: 0; transition: opacity 1.5s ease; }

        /* Modern Typography Logo Design */
        .brand-logo {
            font-family: 'Playfair Display', serif;
            font-size: 2.8rem;
            line-height: 0.8;
            letter-spacing: -0.1em;
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: 0.5s cubic-bezier(0.19, 1, 0.22, 1);
        }
        .brand-logo .t-char { color: #111; position: relative; z-index: 2; }
        .brand-logo .a-char { 
            color: #d1d1cf; 
            margin-left: -0.25em; 
            font-style: italic; 
            font-weight: 900;
            z-index: 1;
            transition: 0.5s;
        }
        .brand-logo:hover .a-char { color: #111; margin-left: -0.1em; }

        /* Professional Card System */
        .tech-card { 
            background: var(--card-bg); 
            border: 1px solid rgba(0,0,0,0.03);
            padding: 30px;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .tech-card:hover { transform: translateY(-12px); box-shadow: 0 50px 90px rgba(0,0,0,0.04); }
        
        .img-container { 
            width: 100%; height: 450px; background: #f2f2f0; 
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; position: relative;
        }
        .img-container img { max-width: 90%; max-height: 90%; object-fit: contain; filter: contrast(1.02); transition: 1.2s ease; }

        /* Minimalist Copy Button */
        .prompt-area {
            position: relative; background: #fafafa;
            padding: 28px; margin-top: 25px; border: 1px solid #f0f0ee; min-height: 90px;
        }
        .copy-icon-btn {
            position: absolute; top: 18px; right: 18px;
            font-size: 14px; color: #d1d1d1; cursor: pointer; transition: 0.3s;
        }
        .copy-icon-btn:hover { color: #111; }
        .copy-icon-btn.copied { color: #10b981 !important; }

        .editorial-title { font-family: 'Cormorant Garamond', serif; }
        .label-text { font-size: 9px; text-transform: uppercase; letter-spacing: 0.4em; color: #a1a1a1; }
        
        /* Footer Aesthetics */
        .social-link { font-size: 16px; color: #b1b1b1; transition: 0.4s; }
        .social-link:hover { color: #111; transform: translateY(-2px); }

        ::-webkit-scrollbar { width: 2px; }
        ::-webkit-scrollbar-thumb { background: #111; }
    </style>
</head>
<body>

    <div id="welcome-screen">
        <p class="label-text mb-4 opacity-50">Authorized Access Only</p>
        <div class="w-32 h-[1px] bg-zinc-200"><div id="loader-bar" class="loader-line"></div></div>
    </div>

    <div id="main-content">
        <nav class="py-16 px-12 flex justify-between items-end max-w-[1600px] mx-auto">
            <div class="brand-logo" title="The Archive">
                <span class="t-char">T</span>
                <span class="a-char">A</span>
            </div>
            <div class="hidden md:flex flex-col items-end">
                <span class="label-text text-zinc-900 font-semibold mb-1">MD ANiK SHEiKH</span>
                <span class="label-text opacity-40">System Core v4.0</span>
            </div>
        </nav>

        <header class="py-32 text-center">
            <h2 class="text-8xl md:text-[10rem] editorial-title font-light tracking-tighter mb-4 text-zinc-900">
                The <span class="italic text-zinc-300">Archive.</span>
            </h2>
            <div class="h-[1px] w-12 bg-zinc-200 mx-auto my-10"></div>
            <p class="label-text tracking-[0.8em]">Curated Visual Intelligence</p>
        </header>

        <main id="main-grid" class="max-w-[1600px] mx-auto px-12 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-16 pb-60">
            </main>

        <footer class="py-32 border-t border-zinc-100 bg-white text-center">
            <div class="flex justify-center gap-14 mb-16">
                <a href="https://instagram.com/6mdaniksheikh9" target="_blank" class="social-link"><i class="fa-brands fa-instagram"></i></a>
                <a href="https://facebook.com/6mdaniksheikh9" target="_blank" class="social-link"><i class="fa-brands fa-facebook-f"></i></a>
                <a href="https://github.com/6anik9" target="_blank" class="social-link"><i class="fa-brands fa-github"></i></a>
            </div>
            <p class="label-text mb-3 tracking-[0.5em] text-zinc-800 font-bold">ANiK ARCHIVE // TERMINAL</p>
            <p class="text-[8px] text-zinc-300 tracking-[0.3em] uppercase">© 2026 Designed for High-End Performance</p>
        </footer>
    </div>

    <script>
        const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQTpKvnBNdPxRkepgDMqxhwp-oZIiDO69lFfNXaMxPSVdgWPUuBzLQsiKEVL6ursmPGoEVzSXme5VvK/pub?gid=0&single=true&output=csv";

        window.onload = () => {
            document.getElementById('loader-bar').style.width = '100%';
            fetchData();
        };

        async function fetchData() {
            Papa.parse(SHEET_URL, {
                download: true, header: true, skipEmptyLines: true,
                complete: (results) => {
                    renderCards(results.data);
                    setTimeout(() => {
                        document.getElementById('welcome-screen').style.opacity = '0';
                        document.getElementById('main-content').style.opacity = '1';
                        setTimeout(() => document.getElementById('welcome-screen').remove(), 1000);
                    }, 1200);
                }
            });
        }

        function renderCards(data) {
            const grid = document.getElementById('main-grid');
            grid.innerHTML = data.map((item, i) => {
                const title = item.Title || "NULL_DATA";
                const img = item.ImageURL || "https://via.placeholder.com/800";
                const prompt = item.Prompt || "No data available in archive.";
                const cat = item.Category || "Visual";

                if(!item.Title) return '';

                return `
                <div class="tech-card group">
                    <div class="img-container">
                        <img src="${img}" alt="${title}" referrerpolicy="no-referrer">
                    </div>
                    <div class="pt-12">
                        <div class="flex justify-between mb-5 items-center">
                            <span class="label-text opacity-50">${cat}</span>
                            <span class="label-text">REF_0${i+1}</span>
                        </div>
                        <h3 class="text-4xl editorial-title font-semibold mb-8 tracking-tight group-hover:italic transition-all duration-700">${title}</h3>
                        <div class="prompt-area">
                            <i class="fa-regular fa-copy copy-icon-btn" onclick="secureCopy('${prompt.replace(/'/g, "\\'").replace(/"/g, '&quot;')}', this)"></i>
                            <p class="text-[11px] leading-relaxed text-zinc-400 font-light italic pr-10">"${prompt}"</p>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        // Reliable Copy Logic
        function secureCopy(text, icon) {
            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            try {
                document.execCommand('copy');
                icon.classList.remove('fa-regular', 'fa-copy');
                icon.classList.add('fa-solid', 'fa-check', 'copied');
                setTimeout(() => {
                    icon.classList.remove('fa-solid', 'fa-check', 'copied');
                    icon.classList.add('fa-regular', 'fa-copy');
                }, 2000);
            } catch (err) {
                console.error('Copy failed');
            }
            document.body.removeChild(el);
        }
    </script>
</body>
</html>
