<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANiK | Executive Archive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:italic,wght@300;600&family=Inter:wght@200;400;600&display=swap');
        
        :root { 
            --bg: #f4f4f2; /* Platinum White/Off-white */
            --card-bg: rgba(255, 255, 255, 0.8);
            --accent: #1a1a1a;
        }
        
        body { 
            background-color: var(--bg); 
            color: var(--accent); 
            font-family: 'Inter', sans-serif; 
            letter-spacing: -0.01em;
        }
        
        /* Smooth Entrance */
        #welcome-screen { 
            position: fixed; inset: 0; background: var(--bg); z-index: 999; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
        }
        .loader-line { width: 0%; height: 1px; background: #000; transition: width 2s ease; }
        #main-content { opacity: 0; transition: opacity 1.5s ease; }

        /* Luxurious Card Layout */
        .tech-card { 
            background: var(--card-bg); 
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0,0,0,0.03);
            padding: 20px;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .tech-card:hover { 
            background: #ffffff;
            box-shadow: 0 40px 80px rgba(0,0,0,0.06);
            transform: translateY(-5px);
        }
        
        /* Professional Image Frame */
        .img-container { 
            width: 100%; height: 400px; 
            background: #ebebe9; 
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
            position: relative;
        }
        .img-container img { 
            max-width: 95%; max-height: 95%; 
            object-fit: contain;
            filter: grayscale(20%); /* Adds a professional editorial look */
            transition: 0.8s ease;
        }
        .tech-card:hover img { filter: grayscale(0%); transform: scale(1.02); }

        /* Minimal Copy Interface */
        .prompt-area {
            position: relative;
            background: rgba(0,0,0,0.02);
            padding: 30px;
            margin-top: 25px;
            border-radius: 2px;
        }
        .copy-trigger {
            position: absolute; top: 15px; right: 15px;
            font-size: 12px; color: #aaa; cursor: pointer;
            transition: 0.3s; text-transform: uppercase; letter-spacing: 0.1em;
        }
        .copy-trigger:hover { color: #000; }

        .editorial-title { font-family: 'Cormorant Garamond', serif; }
        .label-text { font-size: 9px; text-transform: uppercase; letter-spacing: 0.4em; color: #999; }
        
        ::-webkit-scrollbar { width: 2px; }
        ::-webkit-scrollbar-thumb { background: #000; }
    </style>
</head>
<body>

    <div id="welcome-screen">
        <p class="label-text mb-4">Establishing Secure Connection</p>
        <div class="w-40 h-[1px] bg-zinc-200"><div id="loader-bar" class="loader-line"></div></div>
    </div>

    <div id="main-content">
        <nav class="py-12 px-10 flex justify-between items-center max-w-[1600px] mx-auto">
            <h1 class="text-sm font-bold tracking-[0.6em] uppercase">ANiK</h1>
            <span class="label-text">Database System 4.0</span>
        </nav>

        <header class="py-24 text-center">
            <h2 class="text-6xl md:text-8xl editorial-title font-light tracking-tight mb-4">
                The <span class="italic">Archive.</span>
            </h2>
            <div class="h-[1px] w-20 bg-black mx-auto mb-6 opacity-20"></div>
            <p class="label-text text-zinc-400">Curated by MD ANiK SHEiKH</p>
        </header>

        <main id="main-grid" class="max-w-[1600px] mx-auto px-10 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12 pb-40">
            </main>

        <footer class="py-20 border-t border-zinc-200 text-center">
            <p class="label-text">© 2026 Limited Edition Visuals</p>
        </footer>
    </div>

    <script>
        const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQTpKvnBNdPxRkepgDMqxhwp-oZIiDO69lFfNXaMxPSVdgWPUuBzLQsiKEVL6ursmPGoEVzSXme5VvK/pub?gid=0&single=true&output=csv&t=" + new Date().getTime();

        window.onload = () => {
            document.getElementById('loader-bar').style.width = '100%';
            fetchData();
        };

        async function fetchData() {
            Papa.parse(SHEET_URL, {
                download: true, header: true, skipEmptyLines: true,
                complete: (results) => {
                    renderCards(results.data);
                    setTimeout(() => {
                        document.getElementById('welcome-screen').style.opacity = '0';
                        document.getElementById('main-content').style.opacity = '1';
                        setTimeout(() => document.getElementById('welcome-screen').remove(), 1000);
                    }, 1500);
                }
            });
        }

        function renderCards(data) {
            const grid = document.getElementById('main-grid');
            grid.innerHTML = data.map((item, i) => {
                const title = item.Title || "Untitled_Work";
                const img = item.ImageURL || "https://via.placeholder.com/800";
                const prompt = item.Prompt || "";
                const cat = item.Category || "Archive";

                if(!item.Title) return '';

                return `
                <div class="tech-card">
                    <div class="img-container">
                        <img src="${img}" alt="${title}" referrerpolicy="no-referrer">
                    </div>
                    <div class="pt-10 pb-4">
                        <div class="flex justify-between mb-4">
                            <span class="label-text">${cat}</span>
                            <span class="label-text">0${i+1}</span>
                        </div>
                        <h3 class="text-3xl editorial-title font-semibold mb-6 tracking-wide">${title}</h3>
                        <div class="prompt-area">
                            <span class="copy-trigger" onclick="copyPrompt(this, \`${prompt.replace(/`/g, '\\`').replace(/'/g, "\\'")}\`)">Copy Data</span>
                            <p class="text-[11px] leading-relaxed text-zinc-500 font-light italic">"${prompt}"</p>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        function copyPrompt(el, text) {
            navigator.clipboard.writeText(text).then(() => {
                const original = el.innerText;
                el.innerText = "Copied ✓";
                el.style.color = "#000";
                setTimeout(() => {
                    el.innerText = original;
                    el.style.color = "#aaa";
                }, 2000);
            });
        }
    </script>
</body>
</html>
