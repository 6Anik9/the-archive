<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Archive | Interaction Fixed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:italic,wght@300;600&family=Inter:wght@200;400;600&display=swap');
        
        :root { --bg: #f8f8f6; --card-bg: #ffffff; }
        body { background-color: var(--bg); color: #111; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        #welcome-screen { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: 0.8s; }
        .loader-line { width: 0%; height: 1px; background: #000; transition: width 2s ease; }

        /* Fixed Navigation */
        .nav-wrapper { position: relative; z-index: 1000; }
        .sketch-logo-btn {
            width: 55px; height: 55px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.3s;
            -webkit-tap-highlight-color: transparent; /* Mobile touch fix */
        }

        /* Slide Down Menu */
        #drop-menu {
            position: absolute; top: 65px; left: 0;
            background: white; border: 1px solid rgba(0,0,0,0.08);
            width: 200px; border-radius: 4px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            transform: scaleY(0); transform-origin: top;
            opacity: 0; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            pointer-events: none;
        }
        #drop-menu.active { transform: scaleY(1); opacity: 1; pointer-events: auto; }

        .menu-link {
            padding: 14px 20px; display: block;
            font-size: 10px; text-transform: uppercase; letter-spacing: 0.2em;
            color: #888; transition: 0.2s; border-bottom: 1px solid #f5f5f5;
        }
        .menu-link:hover { color: #000; background: #fafafa; padding-left: 24px; }

        /* Card System */
        .tech-card { background: var(--card-bg); border: 1px solid rgba(0,0,0,0.04); padding: clamp(16px, 4vw, 24px); transition: 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        .tech-card:hover { transform: translateY(-8px); box-shadow: 0 30px 60px rgba(0,0,0,0.05); }
        
        .img-container { width: 100%; height: clamp(300px, 50vh, 420px); background: #f0f0ee; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .img-container img { max-width: 90%; max-height: 90%; object-fit: contain; }

        .prompt-area { position: relative; background: #fcfcfb; padding: 20px; margin-top: 15px; border: 1px solid #eee; min-height: 60px; }
        .copy-icon-btn { position: absolute; top: 12px; right: 12px; color: #ccc; cursor: pointer; font-size: 14px; }

        .editorial-title { font-family: 'Cormorant Garamond', serif; }
        .label-text { font-size: clamp(8px, 2vw, 10px); text-transform: uppercase; letter-spacing: 0.3em; color: #999; }
    </style>
</head>
<body>

    <div id="welcome-screen">
        <div class="w-40 h-[1px] bg-zinc-200"><div id="loader-bar" class="loader-line"></div></div>
    </div>

    <div id="main-content" class="opacity-0 transition-opacity duration-1000">
        <nav class="py-8 px-6 md:px-10 flex justify-between items-center max-w-[1500px] mx-auto border-b border-zinc-100">
            <div class="nav-wrapper">
                <div class="sketch-logo-btn" id="logo-trigger">
                    <svg width="55" height="55" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="100" cy="100" r="85" stroke="black" stroke-width="2.5" stroke-dasharray="8 4"/>
                        <path d="M60 85C60 85 80 65 100 65C120 65 140 85 140 85C140 85 120 105 100 105C80 105 60 85 60 85Z" stroke="black" stroke-width="2.5"/>
                        <circle cx="100" cy="85" r="10" stroke="black" stroke-width="2"/>
                        <circle cx="100" cy="85" r="4" fill="black"/>
                        <path d="M100 120V160M100 120C100 120 80 115 60 120C45 125 45 155 45 155C45 155 60 150 75 150C90 150 100 160 100 160ZM100 120C100 120 120 115 140 120C155 125 155 155 155 155C155 155 140 150 125 150C110 150 100 160 100 160Z" stroke="black" stroke-width="2.5" stroke-linecap="round"/>
                    </svg>
                </div>
                <div id="drop-menu">
                    <div class="menu-link" onclick="loadContent('main')">The Archive</div>
                    <div class="menu-link" onclick="loadContent('enhance')">Enhance</div>
                    <div class="menu-link" onclick="loadContent('prompt')">Prompt Breaker</div>
                </div>
            </div>
            <span class="label-text">SYS_V4.0 // ONLINE</span>
        </nav>

        <header class="py-20 text-center px-4">
            <h2 id="page-title" class="text-6xl md:text-9xl editorial-title font-light tracking-tight text-zinc-900">
                The <span class="italic text-zinc-400">Archive.</span>
            </h2>
            <p id="page-sub" class="label-text text-zinc-400 mt-6 tracking-[0.5em]">Curated Visual Intelligence</p>
        </header>

        <main id="main-grid" class="max-w-[1500px] mx-auto px-6 md:px-10 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10 md:gap-14 pb-40">
            </main>
    </div>

    <script>
        const SHEETS = {
            main: "https://docs.google.com/spreadsheets/d/e/2PACX-1vQTpKvnBNdPxRkepgDMqxhwp-oZIiDO69lFfNXaMxPSVdgWPUuBzLQsiKEVL6ursmPGoEVzSXme5VvK/pub?gid=0&single=true&output=csv",
            enhance: "https://docs.google.com/spreadsheets/d/e/2PACX-1vRPZxdHprNT50YNAKd675Va5jMejh5_jOjo3oCE4cAaLdBGF66ZWROJBbWckaPztcHKPq6WzVM0JuqV/pub?output=csv",
            prompt: "" // আপনার ৩য় শিট লিঙ্ক এখানে বসাবেন
        };

        const trigger = document.getElementById('logo-trigger');
        const menu = document.getElementById('drop-menu');

        // Better Touch Handling for Mobile
        const toggleMenu = (e) => {
            e.preventDefault();
            e.stopPropagation();
            menu.classList.toggle('active');
        };

        trigger.addEventListener('click', toggleMenu);
        trigger.addEventListener('touchstart', toggleMenu, {passive: false});

        document.addEventListener('click', () => menu.classList.remove('active'));

        window.onload = () => {
            document.getElementById('loader-bar').style.width = '100%';
            fetchData(SHEETS.main);
        };

        function loadContent(type) {
            const title = document.getElementById('page-title');
            const sub = document.getElementById('page-sub');
            
            if(type === 'main') {
                title.innerHTML = 'The <span class="italic text-zinc-400">Archive.</span>';
                sub.innerText = 'Curated Visual Intelligence';
                fetchData(SHEETS.main);
            } else if(type === 'enhance') {
                title.innerHTML = 'Visual <span class="italic text-zinc-400">Enhance.</span>';
                sub.innerText = 'AI REFINEMENT ENGINE';
                fetchData(SHEETS.enhance);
            }
            menu.classList.remove('active');
        }

        async function fetchData(url) {
            if(!url) return;
            Papa.parse(url, {
                download: true, header: true, skipEmptyLines: true,
                complete: (res) => {
                    renderUI(res.data);
                    document.getElementById('welcome-screen').style.opacity = '0';
                    document.getElementById('main-content').classList.remove('opacity-0');
                    setTimeout(() => document.getElementById('welcome-screen').style.display = 'none', 800);
                }
            });
        }

        function renderUI(data) {
            const grid = document.getElementById('main-grid');
            grid.innerHTML = data.map((item, i) => {
                if(!item.Title || !item.ImageURL) return '';
                return `
                <div class="tech-card">
                    <div class="img-container">
                        <img src="${item.ImageURL}" referrerpolicy="no-referrer" loading="lazy">
                    </div>
                    <div class="pt-8">
                        <div class="flex justify-between mb-3">
                            <span class="label-text text-zinc-400">${item.Category || 'INDEX'}</span>
                            <span class="label-text">0${i+1}</span>
                        </div>
                        <h3 class="text-2xl editorial-title font-semibold mb-4">${item.Title}</h3>
                        <div class="prompt-area">
                            <i class="fa-regular fa-copy copy-icon-btn" onclick="copy(this, '${item.Prompt.replace(/'/g, "\\'")}')"></i>
                            <p class="text-[10px] text-zinc-400 italic font-light leading-relaxed">"${item.Prompt}"</p>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        function copy(btn, text) {
            navigator.clipboard.writeText(text).then(() => {
                btn.className = 'fa-solid fa-check copy-icon-btn text-green-500';
                setTimeout(() => btn.className = 'fa-regular fa-copy copy-icon-btn', 2000);
            });
        }
    </script>
</body>
</html>
